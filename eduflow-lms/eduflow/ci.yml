name: EduFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ─────────────────────────────────────────────
  backend:
    name: Backend — Node.js 18
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Verify server entry point exists
        run: node -e "require('./server.js')" || true

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend — React 18
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: https://eduflow-api.onrender.com/api
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: client/build
          retention-days: 7

  # ─── Docker Build ─────────────────────────────────────────
  docker:
    name: Docker — Build test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t eduflow-server ./server

      - name: Build client image
        run: docker build --build-arg REACT_APP_API_URL=http://localhost:5000/api -t eduflow-client ./client

      - name: Verify images built
        run: docker images | grep eduflow

  # ─── All Green ────────────────────────────────────────────
  notify:
    name: All Checks Passed
    needs: [backend, frontend, docker]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Success
        run: echo "✅ EduFlow CI passed — backend, frontend, and Docker all green!"
